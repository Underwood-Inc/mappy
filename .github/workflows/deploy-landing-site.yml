# Copy to Underwood-Inc/mappy → .github/workflows/deploy-landing-site.yml
# (Public app repo hosts GitHub Pages; this file lives here for review beside publish-landing-site.yml.)
name: Deploy landing site

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - publish-landing-site

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Require public repo token
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Add repository secret PUBLIC_REPO_TOKEN."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          repository: Underwood-Inc/mappy-internal
          ref: ${{ github.event.client_payload.ref || 'master' }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Render landing site
        run: node scripts/render-landing-site.mjs

      - name: Disable Jekyll on GitHub Pages
        run: touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
